:root{
  /* DXC brand core */
  --canvas:#F6F3F0; --midnight:#0E1020; --white:#ffffff;
  /* DXC accents — icons / arrows / numerals / data-viz ONLY */
  --true-blue:#4995FF; --sky:#A1E6FF; --royal:#004AAC;
  --gold:#FFAE41; --peach:#FFC982; --melon:#FF7E51; --dxc-red:#D14600;
  /* shell surface + text */
  --bg:var(--canvas); --panel:#ffffff; --panel-2:#efe9e2;
  --ink:var(--midnight); --muted:#43465a; --faint:#5f6376;
  --line:#e4ddd4; --line-2:#efe9e2;
  /* interactive = Royal (AA on Canvas); accent-2 for hover/dark */
  --accent:#004AAC; --accent-2:#4995FF; --accent-ink:#004AAC;
  /* shell semantic (data-viz) */
  --amber:#c8791a; --amber-bg:#fdf0dc; --amber-line:#f0cd94;
  --red:#D14600; --red-bg:#fbe7dc; --red-line:#f0bd9f;
  /* product mock tokens (used only inside .app/.modal scope below) */
  --green:#16a34a; --green-bg:#e5f6ec; --green-line:#a9dcbc;
  --term-bg:#0b1020; --term-ink:#d6def0; --term-green:#5ff08a; --term-dim:#8892a8;
  --shadow:0 14px 44px -16px rgba(14,16,32,.30);
  --shadow-sm:0 2px 10px -3px rgba(14,16,32,.16);
  --radius:16px; --radius-sm:10px;
  --display:"GT Standard","Inter",Arial,system-ui,sans-serif;
  --sans:"Inter",Arial,system-ui,-apple-system,"Segoe UI",sans-serif;
  --mono:"Cascadia Code",ui-monospace,"SF Mono",Consolas,"Liberation Mono",monospace;
}
:root[data-theme="dark"]{
  /* shell on Midnight Blue */
  --bg:#0E1020; --panel:#171a2c; --panel-2:#121526;
  --ink:#F6F3F0; --muted:#b7bccd; --faint:#8b90a4;
  --line:#2a2e45; --line-2:#1e2238;
  --accent:#4995FF; --accent-2:#A1E6FF; --accent-ink:#8fc0ff;
  --amber:#FFAE41; --amber-bg:#33280f; --amber-line:#6b521c;
  --red:#FF7E51; --red-bg:#3a1c12; --red-line:#5f2f1f;
  --shadow:0 16px 50px -14px rgba(0,0,0,.65);
  --shadow-sm:0 2px 12px -3px rgba(0,0,0,.5);
}
/* ---- product mock island: always live-OASIS look (blue + green, light) ---- */
.app,.modal-scrim{
  --bg:#eef2f8; --panel:#ffffff; --panel-2:#f7f9fc;
  --ink:#0d1626; --muted:#5b6b82; --faint:#7787a0;
  --line:#e2e8f1; --line-2:#eef2f7;
  --accent:#2b7fff; --accent-2:#38bdf8; --accent-ink:#1a5fd6;
  --amber:#e8890c; --amber-bg:#fff5e2; --amber-line:#f4c67a;
  --green:#16a34a; --green-bg:#e5f6ec; --green-line:#a9dcbc;
  --red:#dc2626; --red-bg:#fdeaea; --red-line:#f2b3b3;
  color:#0d1626;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:var(--sans); color:var(--ink); background:var(--bg);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  overflow:hidden;
}
button{font-family:inherit}
::selection{background:rgba(0,74,172,.18)}

/* ---------- Deck shell ---------- */
#deck{position:fixed;inset:0}
.slide{
  position:absolute;inset:0; display:flex;flex-direction:column;
  padding:clamp(20px,4vw,64px); padding-bottom:96px;
  opacity:0; visibility:hidden; transform:translateX(40px) scale(.985);
  transition:opacity .62s cubic-bezier(.16,1,.3,1), transform .62s cubic-bezier(.16,1,.3,1), visibility .62s;
  overflow-y:auto; overflow-x:hidden; scroll-behavior:smooth; will-change:transform,opacity;
  scrollbar-width:thin; scrollbar-color:color-mix(in srgb,var(--ink) 22%,transparent) transparent;
}
.slide.active{opacity:1;visibility:visible;transform:none}
.slide.prev{transform:translateX(-40px) scale(.985)}
.slide::-webkit-scrollbar{width:11px}
.slide::-webkit-scrollbar-thumb{background:color-mix(in srgb,var(--ink) 20%,transparent);border-radius:20px;border:3px solid transparent;background-clip:padding-box}
.slide::-webkit-scrollbar-thumb:hover{background:color-mix(in srgb,var(--ink) 32%,transparent);background-clip:padding-box}
.wrap{width:100%;max-width:1120px;margin:auto}
/* staggered content reveal — enhances already-visible content (RM-safe) */
.slide.active .wrap>*{animation:enter .6s cubic-bezier(.16,1,.3,1) backwards}
.slide.active .wrap>*:nth-child(1){animation-delay:.04s}
.slide.active .wrap>*:nth-child(2){animation-delay:.10s}
.slide.active .wrap>*:nth-child(3){animation-delay:.16s}
.slide.active .wrap>*:nth-child(4){animation-delay:.22s}
.slide.active .wrap>*:nth-child(5){animation-delay:.28s}
.slide.active .wrap>*:nth-child(n+6){animation-delay:.33s}
@keyframes enter{from{opacity:0;transform:translateY(17px)}to{opacity:1;transform:none}}
/* smooth interaction easing */
.navbtn,.playbtn,.iconbtn,.fu,.dot-nav,.sendbtn,.pbtn,.startbtn,.cta .big,.arc-badge,.card,.why,.take .row{transition:transform .32s cubic-bezier(.16,1,.3,1),background .25s ease,color .22s ease,border-color .25s ease,box-shadow .32s cubic-bezier(.16,1,.3,1)}
.navbtn:active,.playbtn:active,.startbtn:active,.cta .big:active,.fu:active,.sendbtn:active,.dot-nav:active{transform:translateY(1px) scale(.984)}

/* ---------- Top bar ---------- */
#topbar{
  position:fixed;top:0;left:0;right:0;height:52px;z-index:40;
  display:flex;align-items:center;gap:14px;
  padding:0 20px; background:color-mix(in srgb,var(--panel) 82%,transparent);
  backdrop-filter:blur(12px); border-bottom:1px solid var(--line);
}
.brand{display:flex;align-items:center;gap:11px;font-weight:700;
  border:none;background:none;padding:0;margin:0;cursor:pointer;font-family:inherit;color:inherit;
  border-radius:8px;transition:opacity .18s ease}
.brand:hover{opacity:.72}
.brand:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
.brand .dxc-logo{display:flex;align-items:center}
.brand .dxc-logo svg{height:21px;width:auto;display:block}
.brand .logo-light{display:none}
:root[data-theme="dark"] .brand .logo-dark{display:none}
:root[data-theme="dark"] .brand .logo-light{display:flex}
.brand .sep{width:1px;height:17px;background:var(--line)}
.brand .oasis{font-family:var(--display);font-size:13.5px;font-weight:700;letter-spacing:.04em;color:var(--ink)}
.brand .tag{font-size:11px;color:var(--faint);font-weight:500;letter-spacing:.02em}
#topbar .spacer{flex:1}
.chip-int{
  font-size:11px;color:var(--accent-ink);background:color-mix(in srgb,var(--accent) 12%,transparent);
  border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);
  padding:3px 9px;border-radius:20px;font-weight:600;display:flex;gap:6px;align-items:center;
}
.chip-int .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 0 var(--accent);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--accent) 60%,transparent)}70%{box-shadow:0 0 0 7px transparent}100%{box-shadow:0 0 0 0 transparent}}
.iconbtn{
  width:34px;height:34px;border-radius:9px;border:1px solid var(--line);
  background:var(--panel);color:var(--muted);cursor:pointer;display:grid;place-items:center;
  transition:.15s;
}
.iconbtn:hover{color:var(--ink);border-color:var(--accent)}

/* ---------- Progress rail ---------- */
#rail{position:fixed;left:0;right:0;bottom:0;height:64px;z-index:40;
  display:flex;align-items:center;gap:8px;padding:0 20px;
  background:color-mix(in srgb,var(--panel) 82%,transparent);
  backdrop-filter:blur(12px);border-top:1px solid var(--line)}
.navbtn{
  height:38px;padding:0 16px;border-radius:9px;border:1px solid var(--line);
  background:var(--panel);color:var(--ink);font-weight:600;font-size:13px;cursor:pointer;
  display:flex;align-items:center;gap:7px;transition:.15s;
}
.navbtn:hover:not(:disabled){border-color:var(--accent);color:var(--accent-ink)}
.navbtn:disabled{opacity:.4;cursor:default}
.navbtn.primary{background:var(--accent);color:#fff;border:none}
.navbtn.primary:hover:not(:disabled){background:var(--accent-ink);color:#fff}
.dots{flex:1;display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.dot-nav{display:flex;align-items:center;gap:7px;padding:5px 10px;border-radius:20px;cursor:pointer;
  font-size:11.5px;color:var(--faint);font-weight:600;border:1px solid transparent;transition:.15s;white-space:nowrap}
.dot-nav i{width:7px;height:7px;border-radius:50%;background:var(--line);transition:.2s}
.dot-nav:hover{color:var(--muted)}
.dot-nav:hover i{background:var(--muted)}
.dot-nav.on{color:var(--accent-ink);background:color-mix(in srgb,var(--accent) 10%,transparent);border-color:color-mix(in srgb,var(--accent) 24%,transparent)}
.dot-nav.on i{background:var(--accent)}
.dot-nav .n{opacity:.55;font-variant-numeric:tabular-nums}
#count{font-size:12px;color:var(--faint);font-variant-numeric:tabular-nums;min-width:42px;text-align:right}

/* ---------- Typography ---------- */
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:700;
  letter-spacing:0;text-transform:none;color:var(--accent-ink);margin-bottom:16px;font-size:13.5px}
.eyebrow::before{content:"";width:22px;height:2px;background:var(--accent);border-radius:2px}
.eyebrow b{font-variant-numeric:tabular-nums;opacity:.65;font-weight:700;margin-right:2px}
h1{font-family:var(--display);font-size:clamp(27px,4.3vw,49px);line-height:1.06;letter-spacing:-.01em;margin:0 0 18px;font-weight:700;text-wrap:balance}
h2{font-family:var(--display);font-size:clamp(22px,3vw,35px);line-height:1.12;letter-spacing:-.008em;margin:0 0 14px;font-weight:700;text-wrap:balance}
h3{font-size:18px;margin:0 0 8px;font-weight:700;letter-spacing:-.005em;text-wrap:balance}
.lead{font-size:clamp(15.5px,1.6vw,19px);line-height:1.55;color:var(--muted);max-width:66ch;margin:0 0 22px}
p{line-height:1.6}
.gradtext{color:inherit}
.muted{color:var(--muted)}
small.src{display:block;margin-top:14px;font-size:11.5px;color:var(--faint);font-style:italic}

/* ---------- Cover ---------- */
#s-cover{background:var(--midnight)}
#s-cover .wrap{max-width:none;display:grid;grid-template-columns:1.05fr .95fr;gap:48px;align-items:center;height:100%}
#s-cover h1{color:#ffffff}
#s-cover .lead{color:#c7cbd9}
#s-cover small.src{color:#8b90a4}
#s-cover .cover-logo{margin-bottom:26px;display:flex}
#s-cover .cover-logo svg{height:26px;width:auto;display:block}
@keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(28px,-22px)}}
.arc-badges{display:flex;gap:10px;flex-wrap:wrap;margin:26px 0 8px}
.arc-badge{font-size:12px;font-weight:600;padding:7px 13px;border-radius:20px;border:1px solid var(--line);background:var(--panel);color:var(--muted);display:flex;gap:7px;align-items:center}
.arc-badge b{color:var(--ink)}
.arc-badge.now{border-color:var(--accent);color:var(--accent-ink);background:color-mix(in srgb,var(--accent) 8%,transparent)}
.arc-badge.dim{opacity:.55}

/* box mock */
.boxviz{position:relative;aspect-ratio:1;max-width:440px;margin:auto;display:grid;place-items:center}
.box-glow{position:absolute;width:88%;height:88%;border-radius:50%;background:radial-gradient(closest-side,var(--gold),var(--melon) 44%,var(--true-blue) 80%,transparent 84%);filter:blur(30px);opacity:.5;animation:spin 26s linear infinite}
.ic-svg{display:block;flex:none}
.card .ic,.why .ic{color:var(--royal)}
.eyebrow .ic-svg,h3 .ic-svg{color:var(--royal)}
@keyframes spin{to{transform:rotate(360deg)}}
.box-card{position:relative;width:82%;background:var(--panel);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:22px;z-index:1}
.box-card .lid{font-size:12px;color:var(--faint);letter-spacing:.14em;text-transform:uppercase;font-weight:700;margin-bottom:14px;display:flex;justify-content:space-between}
.mini-agent{display:flex;gap:10px;align-items:center;padding:11px 12px;border-radius:12px;background:var(--panel-2);border:1px solid var(--line-2);margin-bottom:9px}
.mini-agent .av{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;flex:none;background:var(--panel-2);color:var(--royal);border:1px solid var(--line)}
.mini-agent .t{font-size:12.5px;font-weight:600}
.mini-agent .s{font-size:11px;color:var(--faint)}
.mini-agent:last-child{margin-bottom:0}

/* ---------- Grids / cards ---------- */
.grid{display:grid;gap:16px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm)}
.card.pad-lg{padding:26px}
.card .ic{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;font-size:20px;margin-bottom:14px;background:color-mix(in srgb,var(--accent) 12%,transparent)}
.kpi{font-family:var(--display);font-size:32px;font-weight:700;letter-spacing:-.01em;font-variant-numeric:tabular-nums}
.kpi.red{color:var(--red)} .kpi.amber{color:var(--amber)} .kpi.green{color:var(--ink)}
.klabel{font-size:12px;color:var(--muted);font-weight:600}

/* spine diagram */
.spine{display:grid;grid-template-columns:repeat(4,1fr);gap:0;margin:10px 0 6px}
.spine .step{position:relative;padding:22px 18px;text-align:center}
.pill-motif{display:flex;align-items:center;gap:14px;margin:2px 2px 24px}
.pill-motif .lbl{font-size:12px;font-weight:600;color:var(--muted);white-space:nowrap;display:flex;align-items:center;gap:6px}
.pill-motif .track{flex:1;height:13px;border-radius:20px;background:linear-gradient(90deg,var(--gold),var(--melon) 26%,var(--peach) 44%,var(--sky) 70%,var(--true-blue));box-shadow:inset 0 0 0 1px rgba(14,16,32,.05)}
.spine .step .num{width:40px;height:40px;border-radius:50%;margin:0 auto 12px;display:grid;place-items:center;font-family:var(--display);font-weight:700;
  background:var(--panel);border:1.6px solid var(--royal);color:var(--royal)}
.spine .step h3{font-size:16px}
.spine .step p{font-size:13px;color:var(--muted);margin:4px 0 0;line-height:1.45}
.spine .step:not(:last-child)::after{content:"→";position:absolute;right:-11px;top:31px;color:var(--royal);font-size:18px;font-weight:700;z-index:2}
.spine .step.gate .num{border-color:var(--gold);color:#96590c}

/* ---------- OASIS app mock ---------- */
.app{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:var(--panel);box-shadow:var(--shadow);display:flex;flex-direction:column;min-height:0}
.app-chrome{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--panel-2);border-bottom:1px solid var(--line)}
.app-chrome .tl{display:flex;gap:6px}.app-chrome .tl i{width:11px;height:11px;border-radius:50%;background:var(--line);display:block}
.app-url{flex:1;font-family:var(--mono);font-size:11px;color:var(--faint);background:var(--panel);border:1px solid var(--line);border-radius:7px;padding:4px 10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.app-nav{display:flex;align-items:center;gap:6px;padding:9px 12px;border-bottom:1px solid var(--line);background:var(--panel)}
.app-nav .logo{font-weight:800;font-size:12px;letter-spacing:.14em;color:var(--accent-ink)}
.app-nav .tenant{font-size:11.5px;font-weight:600;color:var(--muted);background:var(--panel-2);border:1px solid var(--line);border-radius:16px;padding:3px 10px;display:flex;gap:6px;align-items:center}
.app-nav .ntab{font-size:11.5px;color:var(--faint);padding:3px 8px;border-radius:6px}
.app-nav .ntab.on{color:var(--ink);background:var(--panel-2);font-weight:600}
.app-nav .clock{margin-left:auto;font-size:11px;color:var(--faint);text-align:right;line-height:1.2}
.app-body{display:grid;grid-template-columns:1fr 1fr;min-height:0}
.dash{padding:16px;border-right:1px solid var(--line);overflow:auto;background:var(--panel-2)}
.dash h4{margin:0 0 3px;font-size:13px}
.dash .sub{font-size:11px;color:var(--faint);margin-bottom:12px}
.metric-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px}
.gauge{--v:100;--c:var(--green);width:120px;height:120px;border-radius:50%;margin:8px auto 4px;
  background:conic-gradient(var(--c) calc(var(--v)*1%),var(--line-2) 0);display:grid;place-items:center;position:relative}
.gauge::before{content:"";position:absolute;inset:12px;background:var(--panel);border-radius:50%}
.gauge span{position:relative;font-weight:800;font-size:22px}
.pri-row{display:flex;gap:8px}
.pri{flex:1;border-radius:10px;padding:10px;color:#fff;text-align:left}
.pri .n{font-size:22px;font-weight:800;line-height:1}
.pri .l{font-size:10px;opacity:.9;font-weight:600}
.pri.p1{background:var(--red)}.pri.p2{background:var(--amber)}.pri.p3{background:#64748b}.pri.p4{background:#94a3b8}

/* chat panel */
.chat{display:flex;flex-direction:column;min-height:0;background:var(--panel)}
.chat-head{display:flex;align-items:center;gap:9px;padding:11px 14px;border-bottom:1px solid var(--line)}
.chat-head .spark{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:grid;place-items:center;color:#fff;font-size:14px}
.chat-head .who{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:.1em;font-weight:700}
.chat-head .agent{font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:5px}
.chat-log{flex:1;overflow:auto;padding:14px;display:flex;flex-direction:column;gap:11px;min-height:220px}
.msg{max-width:92%;font-size:13px;line-height:1.5;animation:rise .35s ease}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg.user{align-self:flex-end;background:linear-gradient(92deg,var(--accent),var(--accent-2));color:#fff;padding:9px 13px;border-radius:14px 14px 4px 14px;font-weight:500}
.msg.agent{align-self:flex-start;color:var(--ink)}
.think{align-self:flex-start;font-size:12px;color:var(--muted);display:flex;flex-direction:column;gap:5px;padding-left:2px}
.think .row{display:flex;align-items:center;gap:8px;animation:rise .3s ease}
.think .row .tk{font-size:11px;font-weight:700;color:var(--accent-ink);background:color-mix(in srgb,var(--accent) 12%,transparent);border-radius:5px;padding:1px 6px}
.think .row.done .ck{color:var(--green)}
.spin-dot{width:12px;height:12px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.card-agent{align-self:stretch;background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:13px;font-size:12.5px;animation:rise .35s ease}
.card-agent h5{margin:0 0 8px;font-size:13px;display:flex;align-items:center;gap:7px}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.03em}
.badge.safe{color:var(--green);background:var(--green-bg);border:1px solid var(--green-line)}
.badge.risk{color:var(--amber);background:var(--amber-bg);border:1px solid var(--amber-line)}
.tbl{width:100%;border-collapse:collapse;font-size:11.5px;margin:2px 0}
.tbl th{text-align:left;color:var(--faint);font-weight:600;padding:5px 8px;border-bottom:1px solid var(--line)}
.tbl td{padding:5px 8px;border-bottom:1px solid var(--line-2)}
.tbl tr:last-child td{border-bottom:none}
.pill-list{list-style:none;margin:6px 0 0;padding:0;display:flex;flex-direction:column;gap:5px}
.pill-list li{padding-left:16px;position:relative}
.pill-list li::before{content:"";position:absolute;left:0;top:7px;width:6px;height:6px;border-radius:50%;background:var(--accent)}
.term{background:var(--term-bg);border-radius:9px;padding:11px 12px;font-family:var(--mono);font-size:11px;color:var(--term-ink);margin-top:8px;overflow-x:auto}
.term .cmt{color:var(--term-dim)}
.term .pr{color:var(--term-green)}
.term pre{margin:0;white-space:pre;line-height:1.5}
.plan-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px;align-items:center}
.pbtn{height:32px;padding:0 15px;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--muted)}
.pbtn.confirm{background:#334155;color:#fff;border:none}
.pbtn.confirm:disabled{background:var(--line);color:var(--faint);cursor:not-allowed}
.pbtn.confirm.armed{background:linear-gradient(92deg,var(--green),#22b866);cursor:pointer;box-shadow:0 4px 14px -4px var(--green)}
.pbtn.ghost:hover{border-color:var(--accent);color:var(--accent-ink)}
.followups{display:flex;flex-direction:column;gap:6px;margin-top:2px}
.fu{text-align:left;font-size:12px;color:var(--ink);background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:8px 11px;cursor:pointer;transition:.15s;display:flex;gap:8px;align-items:center}
.fu:hover{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 6%,transparent)}
.fu::before{content:"›";color:var(--accent);font-weight:800}
.chat-input{display:flex;gap:8px;align-items:center;padding:11px;border-top:1px solid var(--line)}
.chat-input .fake{flex:1;font-size:12.5px;color:var(--faint);background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:9px 12px}
.sendbtn{height:34px;padding:0 14px;border-radius:9px;border:none;background:linear-gradient(92deg,var(--accent),var(--accent-2));color:#fff;font-weight:600;font-size:12.5px;cursor:pointer;display:flex;gap:6px;align-items:center}
.sendbtn:disabled{opacity:.45;cursor:default}
.hint{font-size:11px;color:var(--faint);text-align:center;padding:6px}
.hint b{color:var(--accent-ink)}

/* credential modal */
.modal-scrim{position:absolute;inset:0;background:rgba(10,20,40,.42);display:grid;place-items:center;z-index:20;opacity:0;visibility:hidden;transition:.25s;backdrop-filter:blur(2px)}
.modal-scrim.show{opacity:1;visibility:visible}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);width:min(340px,86%);padding:20px;transform:translateY(10px);transition:.25s}
.modal-scrim.show .modal{transform:none}
.modal h5{margin:0 0 3px;font-size:15px;display:flex;align-items:center;gap:8px}
.modal .warn{color:var(--amber)}
.modal p{font-size:12px;color:var(--muted);margin:0 0 14px}
.modal p b{color:var(--accent-ink);font-family:var(--mono)}
.field{margin-bottom:11px}
.field label{display:block;font-size:11px;color:var(--muted);font-weight:600;margin-bottom:4px}
.field input{width:100%;font-size:13px;padding:8px 11px;border:1px solid var(--line);border-radius:9px;background:var(--panel-2);color:var(--ink);font-family:var(--mono)}
.field input:focus{outline:none;border-color:var(--accent)}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:6px}

/* CIO banner */
.cio-stage{position:relative}
.alert-banner{display:flex;gap:14px;align-items:center;background:var(--amber-bg);border:1px solid var(--amber-line);border-radius:12px;padding:16px 18px;margin-bottom:18px;
  opacity:0;transform:translateY(-8px);transition:.5s;pointer-events:none;height:0;padding-top:0;padding-bottom:0;margin:0;overflow:hidden}
.alert-banner.show{opacity:1;transform:none;height:auto;padding:16px 18px;margin-bottom:18px;pointer-events:auto}
.alert-banner .bell{font-size:26px;animation:ring 1s ease infinite}
@keyframes ring{0%,100%{transform:rotate(0)}20%{transform:rotate(-12deg)}40%{transform:rotate(10deg)}60%{transform:rotate(-6deg)}}
.alert-banner .txt b{color:var(--amber)}
.countdown{font-variant-numeric:tabular-nums;font-weight:800;color:var(--amber);font-family:var(--mono)}
.reveal-compare{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.reveal-compare .side{border:1px solid var(--line);border-radius:14px;padding:18px;background:var(--panel)}
.reveal-compare .side.tech{background:var(--term-bg);border-color:#1c2942;color:var(--term-ink)}
.reveal-compare .side .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:10px}
.reveal-compare .side.biz .lbl{color:var(--accent-ink)}
.reveal-compare .side.tech .lbl{color:var(--term-green)}
.reveal-compare .side.tech code{font-family:var(--mono);font-size:12px;color:var(--term-ink);display:block;line-height:1.7}

/* delegation animation (TAM) */
.deleg{display:flex;flex-direction:column;gap:9px}
.deleg .node{display:flex;gap:10px;align-items:center;padding:10px 12px;border:1px solid var(--line);border-radius:11px;background:var(--panel);opacity:.35;transition:.4s}
.deleg .node.lit{opacity:1;border-color:var(--accent);box-shadow:var(--shadow-sm)}
.deleg .node .av{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-size:15px;flex:none;background:var(--panel-2)}
.deleg .node .t{font-size:13px;font-weight:600}.deleg .node .d{font-size:11px;color:var(--faint)}
.deleg .arrow{margin-left:26px;color:var(--accent);font-weight:800;opacity:.35;transition:.4s}
.deleg .arrow.lit{opacity:1}

/* diff / why cards */
.why{display:flex;gap:14px;align-items:flex-start;padding:18px;border:1px solid var(--line);border-radius:14px;background:var(--panel)}
.why .ic{width:44px;height:44px;border-radius:12px;flex:none;display:grid;place-items:center;font-size:22px;background:color-mix(in srgb,var(--accent) 12%,transparent)}
.why h3{font-size:16px;margin-bottom:5px}
.why p{font-size:13px;color:var(--muted);margin:0}
.vs{font-size:11.5px;color:var(--faint);margin-top:7px}
.vs b{color:var(--ink)}

/* takeaways */
.take{counter-reset:t;display:flex;flex-direction:column;gap:14px}
.take .row{display:flex;gap:18px;align-items:flex-start;padding:20px 22px;border:1px solid var(--line);border-radius:14px;background:var(--panel);position:relative;overflow:hidden}
.take .row::before{counter-increment:t;content:counter(t);font-size:64px;font-weight:800;color:color-mix(in srgb,var(--accent) 14%,transparent);line-height:.8;flex:none}
.take .row h3{margin-bottom:4px}
.take .row p{margin:0;color:var(--muted);font-size:14px}
.cta{display:flex;gap:12px;flex-wrap:wrap;margin-top:26px}
.cta .big{height:50px;padding:0 26px;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;border:none;
  background:var(--accent);color:#fff;display:flex;align-items:center;gap:9px;box-shadow:0 8px 22px -10px rgba(0,74,172,.5)}
.cta .big.ghost{background:var(--panel);color:var(--ink);border:1px solid var(--line);box-shadow:none}

/* utility */
.startbtn{height:52px;padding:0 30px;border-radius:13px;border:none;font-weight:700;font-size:16px;cursor:pointer;
  background:var(--accent);color:#fff;display:inline-flex;align-items:center;gap:10px;
  box-shadow:0 12px 28px -12px rgba(0,74,172,.6);transition:.2s}
.startbtn:hover{transform:translateY(-3px);box-shadow:0 20px 42px -14px rgba(0,74,172,.62)}
.playbtn:hover{transform:translateY(-1px)}
.navbtn:hover:not(:disabled){transform:translateY(-1px)}
.slide .card:hover,.why:hover{transform:translateY(-3px);box-shadow:0 16px 38px -18px rgba(14,16,32,.30)}
.playbtn{height:38px;padding:0 16px;border-radius:10px;border:1px solid var(--accent);background:color-mix(in srgb,var(--accent) 8%,transparent);
  color:var(--accent-ink);font-weight:600;font-size:13px;cursor:pointer;display:inline-flex;gap:8px;align-items:center;transition:.15s}
.playbtn:hover{background:var(--accent);color:#fff}
.playbtn:disabled{opacity:.5;cursor:default}
.two{display:grid;grid-template-columns:1fr 1fr;gap:32px;align-items:center;height:100%}
@media(max-width:900px){
  .two,#s-cover .wrap,.g2,.g4,.reveal-compare,.app-body{grid-template-columns:1fr}
  .g3,.spine{grid-template-columns:1fr 1fr}
  .app-body{grid-template-columns:1fr}
  .dash{border-right:none;border-bottom:1px solid var(--line);max-height:230px}
  .spine .step::after{display:none}
  #rail .dots{display:none}
  /* stacked dash+chat: stop forcing .app to a squeezed flex height (it clips
     content with no reachable scroll) — let it grow to content and ride the
     slide's own scroll instead, like every other tall slide already does */
  .app{flex:none!important;min-height:0!important;max-height:none!important}
  .chat{min-height:0}
  .chat-log{max-height:44vh;overflow-y:auto}
}
/* ---------- Phone ---------- */
@media(max-width:560px){
  html{-webkit-text-size-adjust:100%}
  #topbar{gap:8px;padding:0 12px}
  .brand{gap:7px;min-width:0}
  .brand .dxc-logo svg{height:17px;flex:none}
  .brand .sep{display:none}
  .brand .oasis{font-size:12px}
  .brand .tag{display:none}
  .chip-int{padding:3px;gap:0;border-radius:50%;width:26px;height:26px;justify-content:center;flex:none}
  .chip-int .chip-text{display:none}
  .chip-int .dot{width:7px;height:7px}
  .iconbtn{flex:none;width:38px;height:38px}
  #rail{padding:0 12px;gap:6px}
  .navbtn{flex:none;height:44px;padding:0 14px;font-size:12.5px}
  #count{display:none}
  .slide{padding:16px;padding-bottom:88px}
  h1{font-size:clamp(26px,8vw,34px)}
  h2{font-size:clamp(21px,6.5vw,28px)}
  .g3{grid-template-columns:1fr}
  .cover-logo svg,.brand .dxc-logo svg{max-width:100%}
  /* product mock chrome: collapse to fit a phone, same governance content */
  .app-nav{flex-wrap:nowrap;gap:4px;padding:8px 10px}
  .app-nav .tenant{padding:3px 7px;font-size:10.5px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block}
  .app-nav .ntab:not(.on){display:none}
  .app-nav .ntab.on{font-size:10.5px;padding:3px 7px}
  .app-nav .clock{display:none}
  .dash{max-height:none}
  .chat-log{min-height:180px}
  .app{min-height:0}
  .pbtn{height:38px;font-size:12px}
  .plan-actions{flex-wrap:wrap;row-gap:8px}
  .playbtn{min-height:40px}
  .fu{min-height:38px}
  /* CIO: button + growing status text can't safely share a row this narrow */
  .cio-trigger-row{flex-direction:column;align-items:flex-start!important;gap:10px!important}
  .alert-banner{align-items:flex-start}
  .alert-banner .bell{flex:none}
}
.fade-seq>*{opacity:0;transform:translateY(10px);animation:rise .5s ease forwards}
.fade-seq>*:nth-child(1){animation-delay:.05s}.fade-seq>*:nth-child(2){animation-delay:.15s}
.fade-seq>*:nth-child(3){animation-delay:.25s}.fade-seq>*:nth-child(4){animation-delay:.35s}
.fade-seq>*:nth-child(5){animation-delay:.45s}.fade-seq>*:nth-child(6){animation-delay:.55s}

/* keyboard focus visibility */
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
.dot-nav:focus-visible{outline-offset:0}

/* reduced motion: kill ambient loops, keep meaning; crossfade slides */
@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms!important;animation-iteration-count:1!important;scroll-behavior:auto!important}
  .cover-aura::before,.cover-aura::after,.box-glow{animation:none!important}
  .slide{transition:opacity .2s ease!important;transform:none!important}
  .slide:not(.active){transform:none!important}
  .fade-seq>*{opacity:1!important;transform:none!important}
  .slide.active .wrap>*{animation:none!important}
  .spin-dot{animation:none!important;border-top-color:var(--accent)!important}
  .chip-int .dot,.alert-banner .bell{animation:none!important}
  .msg,.card-agent,.think .row{animation:none!important}
  body{animation:none!important}
}
body{animation:pageIn .5s ease}
@keyframes pageIn{from{opacity:0}to{opacity:1}}
</style>

<section class="slide">

    <h2>A mid-sized airline. Four hours to an outage.</h2>

        <p style="margin:0 0 8px"><b>Every flight runs through this service</b> — scheduling, gate assignment, crew rostering.</p>

/* ============================================================
   RENDER + NAVIGATION
   ============================================================ */
const deck=document.getElementById('deck');
deck.innerHTML=slides.map(s=>s.html).join('');
const slideEls=[...deck.querySelectorAll('.slide')];
const dotsWrap=document.getElementById('dots');
dotsWrap.innerHTML=slides.map((s,i)=>`<div class="dot-nav" data-i="${i}"><span class="n">${String(i).padStart(2,'0')}</span><i></i>${s.nav}</div>`).join('');
const dotEls=[...dotsWrap.querySelectorAll('.dot-nav')];
const countEl=document.getElementById('count');
let cur=0, entered={};

function show(i){
  i=Math.max(0,Math.min(slides.length-1,i));
  slideEls.forEach((el,k)=>{el.classList.toggle('active',k===i);el.classList.toggle('prev',k<i)});
  dotEls.forEach((d,k)=>d.classList.toggle('on',k===i));
  countEl.textContent=String(i+1).padStart(2,'0')+' / '+String(slides.length).padStart(2,'0');
  document.getElementById('prev').disabled=i===0;
  const nx=document.getElementById('next');nx.disabled=i===slides.length-1;nx.style.opacity=i===slides.length-1?.4:1;
  cur=i;
  slideEls[i].scrollTop=0;
  if(onEnter[i]&&!entered[i]){entered[i]=true;} if(onEnter[i]) onEnter[i]();
}
document.getElementById('next').onclick=()=>show(cur+1);
document.getElementById('prev').onclick=()=>show(cur-1);
dotEls.forEach(d=>{
  d.setAttribute('role','button');d.tabIndex=0;d.setAttribute('aria-label','Go to '+d.textContent);
  d.onclick=()=>show(+d.dataset.i);
  d.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();show(+d.dataset.i);}};
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){const m=document.getElementById('luxModal');if(m&&m.classList.contains('show')){m.classList.remove('show');return;}}
  if(e.target.tagName==='INPUT')return;
  if(e.key==='ArrowRight'||e.key==='PageDown'){show(cur+1)}
  if(e.key==='ArrowLeft'||e.key==='PageUp'){show(cur-1)}
});
document.addEventListener('click',e=>{const g=e.target.closest('[data-go]');if(g)show(+g.dataset.go)});

/* smooth wheel / touch navigation — advances slides, yields to in-slide scroll */
let wheelLock=false, wheelAcc=0, wheelTimer=null;
deck.addEventListener('wheel',e=>{
  const s=slideEls[cur];
  const canScroll=s.scrollHeight>s.clientHeight+2;
  const atTop=s.scrollTop<=0, atBot=s.scrollTop+s.clientHeight>=s.scrollHeight-1;
  const down=e.deltaY>0;
  if(canScroll && !((down&&atBot)||(!down&&atTop))){ wheelAcc=0; return; }
  e.preventDefault();
  if(wheelLock) return;
  wheelAcc+=e.deltaY;
  clearTimeout(wheelTimer); wheelTimer=setTimeout(()=>wheelAcc=0,180);
  if(Math.abs(wheelAcc)>64){
    const d=wheelAcc>0?1:-1; wheelAcc=0;
    if((d>0&&cur<slides.length-1)||(d<0&&cur>0)){ wheelLock=true; show(cur+d); setTimeout(()=>{wheelLock=false;},760); }
  }
},{passive:false});
let touchY=null;
deck.addEventListener('touchstart',e=>{touchY=e.touches[0].clientY;},{passive:true});
deck.addEventListener('touchend',e=>{
  if(touchY==null)return;
  const dy=e.changedTouches[0].clientY-touchY; touchY=null;
  const s=slideEls[cur];
  if(s.scrollHeight>s.clientHeight+2)return;
  if(Math.abs(dy)>55){ const d=dy<0?1:-1; if((d>0&&cur<slides.length-1)||(d<0&&cur>0)) show(cur+d); }
},{passive:true});

/* theme */
const tb=document.getElementById('themebtn');
tb.onclick=()=>{const r=document.documentElement;const d=r.getAttribute('data-theme')==='dark';r.setAttribute('data-theme',d?'light':'dark')};

/* ============================================================
   HELPERS for scripted chat
   ============================================================ */
const wait=ms=>new Promise(r=>setTimeout(r,ms));
function el(html){const t=document.createElement('template');t.innerHTML=html.trim();return t.content.firstChild;}
function addTo(log,node){log.appendChild(node);log.scrollTop=log.scrollHeight;return node;}
async function thinking(log,steps,perStep=520){
  const box=addTo(log,el(`<div class="think"></div>`));
  for(const s of steps){
    const row=addTo(box,el(`<div class="row"><span class="spin-dot"></span><span>${s}</span></div>`));
    log.scrollTop=log.scrollHeight;
    await wait(perStep);
    row.classList.add('done');
    row.querySelector('.spin-dot').outerHTML=`<span class="ck" style="color:var(--green)">✓</span>`;
  }
  return box;
}

/* ============================================================
   SLIDE 3 — CIO alert + countdown
   ============================================================ */
let cioTimer=null;
function cioStart(){
  const btn=document.getElementById('cioTrigger');
  btn.onclick=()=>{
    document.getElementById('cioBanner').classList.add('show');
    document.getElementById('cioNote').textContent='Alert live. The same signal is now on the Linux engineer dashboard — with the technical detail. →';
    btn.disabled=true;btn.textContent='● Alert live';
    let t=4*3600;
    clearInterval(cioTimer);
    cioTimer=setInterval(()=>{
      t=Math.max(0,t-137);
      const h=String(Math.floor(t/3600)).padStart(2,'0');
      const m=String(Math.floor(t%3600/60)).padStart(2,'0');
      const s=String(t%60).padStart(2,'0');
      document.getElementById('cioClock').textContent=`${h}:${m}:${s}`;
      if(t<=0)clearInterval(cioTimer);
    },1000);
  };
}

/* ============================================================
   SLIDE 4 — LINUX hero interactive state machine
   ============================================================ */
const luxState={step:0,busy:false};
function luxReset(){
  luxState.step=0;luxState.busy=false;
  const log=document.getElementById('luxLog');log.innerHTML='';
  document.getElementById('luxFake').textContent='Ask the Linux System agent…';
  luxKickoff();
}
function luxFollow(log,items){
  const box=addTo(log,el(`<div class="card-agent" style="border-style:dashed"><div style="font-size:11px;color:var(--faint);font-weight:700;margin-bottom:6px">Suggested — click one</div><div class="followups"></div></div>`));
  const fu=box.querySelector('.followups');
  items.forEach(it=>{const b=el(`<button class="fu">${it.label}</button>`);b.onclick=()=>{if(luxState.busy)return;box.remove();it.run();};fu.appendChild(b);});
}

function luxModalWire(){
